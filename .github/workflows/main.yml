name: CI - Lint and Test

on:
  push:
    branches: [main, master, saturday-workings]
  pull_request:
    branches: [main, master, saturday-workings]

jobs:
  # 1. LINT AND TEST THE SPRING BOOT BACKEND
  backend-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: "maven"

      - name: Build and Test with Maven
        # Removed P0RodgersD/ prefix to match the runner's root
        working-directory: P0RodgersD/backend/Employee_metadata/Employee_metadata
        run: mvn test

  # 2. LINT AND TEST THE FASTAPI SERVICE (Python)
  fastapi-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        working-directory: P0RodgersD/backend/FastAPIEnv
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Run Ruff Lint check
        working-directory: P0RodgersD/backend/FastAPIEnv
        run: ruff check .

      - name: Run Ruff Format check
        working-directory: P0RodgersD/backend/FastAPIEnv
        run: ruff format --check .

  # 3. LINT THE REACT FRONTEND
  frontend-react:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          # Path must be relative to the repo root
          cache-dependency-path: P0RodgersD/frontend/my-app/package-lock.json

      - name: Install and Lint
        working-directory: P0RodgersD/frontend/my-app
        run: |
          npm install
          npm run lint
