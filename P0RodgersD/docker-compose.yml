version: '3.8'

services:
  # 1. PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      - POSTGRES_USER=donovr
      - POSTGRES_PASSWORD=password123
      - POSTGRES_DB=algo_test_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  # 2. Spring Boot Backend
  spring-backend:
    build:
      context: ./backend/Employee_metadata/Employee_metadata
    container_name: spring-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/algo_test_db
      - SPRING_DATASOURCE_USERNAME=donovr
      - SPRING_DATASOURCE_PASSWORD=password123
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  # 3. FastAPI/CARLA Backend
  fastapi-carla:
    build:
      context: ./backend/FastAPIEnv
    container_name: fastapi-carla
    ports:
      - "8000:8000"
    environment:
      - CARLA_HOST=host.docker.internal
    networks:
      - app-network

  # 4. React Frontend
  frontend:
    build:
      context: ./frontend/my-app
    container_name: react-frontend
    ports:
      - "5173:5173"
    depends_on:
      - spring-backend
      - fastapi-carla
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data: